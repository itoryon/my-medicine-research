<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Библиотека исследований</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-hover: #222633;
    --border: #2a2e3a;
    --text: #e4e6ed;
    --text-muted: #8b8fa3;
    --accent: #6c8cff;
    --accent-glow: rgba(108,140,255,.15);
    --green: #4ade80;
    --purple: #a78bfa;
    --cyan: #22d3ee;
    --orange: #fb923c;
    --radius: 14px;
    --transition: .3s cubic-bezier(.4,0,.2,1);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* ===== HEADER ===== */
  header {
    text-align: center;
    padding: 60px 20px 40px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(108,140,255,.06) 0%, transparent 100%);
  }

  header h1 {
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 800;
    margin-bottom: 12px;
    background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    color: var(--text-muted);
    font-size: 1.1rem;
    max-width: 500px;
    margin: 0 auto;
  }

  /* ===== GRID ===== */
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 20px 60px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }

  /* ===== CARD ===== */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    transition: var(--transition);
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--card-color, var(--accent));
    opacity: 0;
    transition: var(--transition);
  }

  .card:hover {
    border-color: var(--card-color, var(--accent));
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,.3);
  }

  .card:hover::before { opacity: 1; }

  .card-icon {
    font-size: 2.4rem;
    margin-bottom: 16px;
    display: block;
  }

  .card h2 {
    font-size: 1.15rem;
    font-weight: 700;
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .card p {
    color: var(--text-muted);
    font-size: .9rem;
    flex: 1;
  }

  .card .badge {
    display: inline-block;
    margin-top: 16px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: .75rem;
    font-weight: 600;
    background: rgba(108,140,255,.12);
    color: var(--card-color, var(--accent));
    align-self: flex-start;
  }

  /* ===== FOOTER ===== */
  footer {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
    font-size: .82rem;
    border-top: 1px solid var(--border);
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    header { padding: 40px 16px 30px; }
    .container { padding: 24px 16px 40px; }
    .grid { grid-template-columns: 1fr; gap: 14px; }
    .card { padding: 22px; }
  }
</style>
</head>
<body>

<header>
  <h1>🧠 Библиотека исследований</h1>
  <p>Научно обоснованные материалы о мозге, обучении и здоровье</p>
</header>

<div class="container">
  <div class="grid">

    <a href="brain-fatigue.html" class="card" style="--card-color:#6c8cff">
      <span class="card-icon">🧠</span>
      <h2>Переутомление головного мозга</h2>
      <p>Почему нельзя постоянно учиться. Нейромедиаторы, стресс, выгорание, парадокс продуктивности.</p>
      <span class="badge">6 разделов · 60+ источников</span>
    </a>


  </div>
</div>

<footer>
  📚 Библиотека научных исследований · 2026
</footer>

</body>
</html>
